<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>objects</title>
    <style>
        body {
            padding: 0;
            margin: 0;
        }

        #main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .user-box {
            display: flex;
            padding: 15px;
            justify-content: space-evenly;
            /* gap: 50px; */
            border: 1px solid black;
            align-items: center;
        }

        #modal {
            height: 100%;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.748);
            /* opacity: 0.5; */
            position: absolute;
            justify-content: center;
            align-items: center;
            display: none;
        }

        .container {
            height: 100vh;
            width: 100vw;
            overflow: scroll;
        }
        #content{
            height: 80%;
            width: 80%;
            background-color: white;
        }
        .header{
            display: flex;
            justify-content: end;
            background-color: aqua;
        }
        .close{
            background-color: red;
        }
        .user-info{
            background-color: bisque;
            height: 100%;
        }
    </style>
    <script defer src="./app.js"></script>
</head>

<body>

    <div class="container">
        <div id="modal">

            <div id="content">
                <div class="header">
                    <button class="close"
                    onClick="closeModal()"
                    >close</button>
                </div>
                <div class="user-info"></div>
            </div>
        </div>

        <div id="main">


        </div>
    </div>


</body>

</html>
